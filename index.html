<!doctype html>
<html lang="en">
  <head>
  <meta charset="UTF-8" />

  <!-- Favicon (Replace with your logo later) -->
  <link rel="icon" type="image/png" href="./src/assets/logo/brand/logo-main.png" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title (Optimized for SEO + CTR) -->
  <title>SquareUp | Digital Agency for Web, UI/UX & Scalable Solutions</title>

  <!-- Primary SEO -->
  <meta name="description" content="SquareUp is a results-driven digital agency offering UI/UX design, web development, mobile apps, and scalable software solutions to help businesses grow faster." />
  <meta name="author" content="Om Italiya" />

  <!-- Canonical (IMPORTANT: change before deploy) -->
  <link rel="canonical" href="https://squareup.com/" />

  <!-- Open Graph (Social Sharing) -->
  <meta property="og:title" content="SquareUp | Digital Agency for Web, UI/UX & Scalable Solutions" />
  <meta property="og:description" content="We design and build modern digital products — websites, apps, and scalable platforms that drive business growth." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://squareup.com/" />
  <meta property="og:image" content="https://squareup.com/og-image.jpg" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SquareUp Digital Agency" />
  <meta name="twitter:description" content="UI/UX Design, Web Development & Digital Solutions for modern businesses." />
  <meta name="twitter:image" content="https://squareup.com/og-image.jpg" />

  <!-- Performance Optimization -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

</head>

    <div id="root"></div>
    <script type="module" src="./src/app/main.jsx"></script>
